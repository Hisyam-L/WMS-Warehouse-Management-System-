services:
  - type: web
    name: wms-cermin-nusantara # Bebas, kasih nama project lu
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --config gunicorn_config.py app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0 # Sesuaikan sama versi python di venv lu
      - key: SUPABASE_URL
        sync: false # Biar lu setting di dashboard Render (Lebih Aman)
      - key: SUPABASE_KEY
        sync: false