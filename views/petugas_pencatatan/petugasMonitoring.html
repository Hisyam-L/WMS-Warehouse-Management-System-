<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Petugas Pencatatan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='petugas_pencatatan/css/petugasMonitoring.css') }}">
</head>

<body>

    <div class="container-layout">

        <!-- SIDEBAR -->
        <div class="sidebar">

            <h3>Monitoring Kaca</h3>

            <button>Lapor Barang Masuk</button>

            <button>Info Barang Dibeli</button>

            <button>Lapor Barang Keluar</button>

            <button>Pesan / Chatting</button>

            <button>Logout</button>

        </div>

        <!-- CONTENT -->
        <div class="content">

            <!-- NAVBAR MOBILE -->
            <div class="navbar-mobile">

                <div>Petugas Monitoring</div>

                <div onclick="toggleMenu()" style="cursor:pointer;font-size:22px;">
                    ☰
                </div>

            </div>

            <!-- MOBILE MENU -->
            <div id="mobileMenu" class="mobile-menu">

                <button>Lapor Barang Masuk</button>

                <button>Info Barang Dibeli</button>

                <button>Lapor Barang Keluar</button>

                <button>Pesan / Chatting</button>

                <button>Logout</button>

            </div>

            <!-- CHAT -->
            <div class="chat-container">

                <!-- HEADER -->
                <div class="chat-header">

                    <button class="back-btn" onclick="window.location.href='chatting.html'">

                        ←

                    </button>

                    <span>
                        Petugas Monitoring
                    </span>

                </div>

                <!-- CHAT BOX -->
                <div class="chat-box" id="chatBox">

                    <div class="bubble bubble-left">
                        <div class="avatar"></div>

                        <div class="message">
                            Halo, bagaimana kondisi stok kaca hari ini?
                        </div>
                    </div>

                    <div class="bubble bubble-right">
                        <div class="avatar"></div>

                        <div class="message">
                            Aman pak, stok masih tersedia.
                        </div>
                    </div>

                    <div class="bubble bubble-left">
                        <div class="avatar"></div>

                        <div class="message">
                            Ada kaca yang rusak?
                        </div>
                    </div>

                    <div class="bubble bubble-right">
                        <div class="avatar"></div>

                        <div class="message">
                            Ada beberapa kaca biru yang retak.
                        </div>
                    </div>

                </div>

                <!-- FOOTER -->
                <div class="chat-footer">

                    <div class="input-group">

                        <input type="text" id="chatInput" class="input-chat" placeholder="Ketik pesan...">

                        <button class="send-btn" onclick="kirimPesan()">

                            ➤

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="{{ url_for('static', filename='petugas_pencatatan/js/petugasMonitoring.js') }}"></script>

</body>

</html>
