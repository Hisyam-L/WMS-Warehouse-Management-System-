<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Kaca Masuk</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            margin: 0;
            font-family: system-ui, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #0f172a;
        }

        .container-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, #0f172a, #1e293b);
            color: white;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar h3 {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .sidebar button {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: none;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
        }

        .sidebar button:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateX(3px);
        }

        .content {
            flex: 1;
            padding: 20px;
        }

        .navbarMobile {
            display: none;
            background: #0f172a;
            color: white;
            padding: 15px;
            justify-content: space-between;
            align-items: center;
            border-radius: 10px;
        }

        .menuMobile {
            display: none;
            flex-direction: column;
            margin-top: 10px;
            background: #1e293b;
            padding: 10px;
            border-radius: 10px;
        }

        .menuMobile button {
            margin-top: 5px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: none;
            border-radius: 8px;
        }

        .cardUtama {
            background-color: #f5eeed;
            border-radius: 16px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .boxHeader {
            background: white;
            border: 1px #0f172a solid;
            color: #0f172a;
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .labelForm {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-select,
        .form-control {
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 12px;
            background: #fcfcfc;
        }

        .form-select:focus,
        .form-control:focus {
            border-color: #0f172a;
            box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.1);
        }

        .boxUpload {
            width: 140px;
            height: 140px;
            border: 2px dashed #94a3b8;
            border-radius: 14px;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: hidden;
            transition: 0.2s;
        }

        .boxUpload:hover {
            border-color: #0f172a;
        }

        .boxUpload span {
            color: #64748b;
            font-size: 14px;
            text-align: center;
            padding: 10px;
        }

        .boxUpload img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .btn-submit {
            background: #0f172a;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            width: 100%;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-submit:hover {
            background: #1e293b;
            color: white;
        }

        @media(max-width:768px) {
            .sidebar {
                display: none;
            }
            .navbarMobile {
                display: flex;
            }
            .content {
                padding: 15px;
            }
            .boxUpload {
                width: 100%;
                height: 180px;
            }
        }
    </style>
</head>

<body>

    <div class="container-layout">
        <div class="sidebar">
            <h3>Petugas Pencatatan</h3>

            <button>Lapor Barang Masuk</button>
            <button>Info Barang Dibeli</button>
            <button>Lapor Barang Keluar</button>
            <button>Pesan / Chatting</button>
            <button>Logout</button>
        </div>

        <div class="content">
            <div class="navbarMobile">
                <div>Petugas Pencatatan</div>
                <div onclick="toggleMenu()" style="cursor:pointer;font-size:22px;">
                    ☰
                </div>
            </div>
            <div id="mobileMenu" class="menuMobile">
                <button>Lapor Barang Masuk</button>
                <button>Info Barang Dibeli</button>
                <button>Lapor Barang Keluar</button>
                <button>Pesan / Chatting</button>
                <button>Logout</button>
            </div>
            <div class="cardUtama">
                <div class="boxHeader">
                    Laporan Kaca Masuk
                </div>
                <form>
                    <div class="mb-4">
                        <label class="labelForm">
                            Tambah Gambar
                        </label>
                        <div class="boxUpload" onclick="bukaKamera()">
                            <span id="uploadText">
                                Klik untuk buka kamera
                            </span>
                            <img id="previewImage">
                        </div>
                        <input type="file" id="imgInput" accept="image/*" capture="environment" style="display:none;">
                    </div>
                    <div class="mb-3">
                        <label class="labelForm">
                            Kategori Kaca
                        </label>
                        <select class="form-select">
                            <option>Pilih Kategori</option>
                            <option>Cermin</option>
                            <option>Rebaint</option>
                            <option>Biru</option>
                            <option>Hitam</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="labelForm">
                            Ukuran Kaca
                        </label>

                        <select class="form-select">
                            <option>Pilih Ukuran</option>
                            <option>100 x 200</option>
                            <option>150 x 250</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="labelForm">
                            Ketebalan Kaca
                        </label>

                        <select class="form-select">
                            <option>Pilih Ketebalan</option>
                            <option>2 mm</option>
                            <option>5 mm</option>
                            <option>10 mm</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="labelForm">
                            Jumlah Kaca
                        </label>

                        <input type="number" class="form-control" rows="4"
                            placeholder="Masukkan Jumlah Kaca">
                    </div>
                    <button type="submit" class="btn-submit">
                        Catat Kaca Masuk
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script>
        let menuOpen = false;
        function toggleMenu() {
            menuOpen = !menuOpen;
            const mobileMenu = document.getElementById("mobileMenu");
            mobileMenu.style.display = menuOpen ? "flex" : "none";
        }
        const imgInput =
            document.getElementById("imgInput");
        const previewImage =
            document.getElementById("previewImage");
        const uploadText =
            document.getElementById("uploadText");
        function bukaKamera() {
            imgInput.click();
        }
        imgInput.addEventListener("change", function () {
            const file = this.files[0];
            if (!file) {
                return;
            }
            if (!file.type.startsWith("image/")) {
                alert("File harus berupa gambar");
                return;
            }
            const reader = new FileReader();
            reader.onload = function (event) {
                previewImage.src = vent.target.result;
                previewImage.style.display = "block";
                uploadText.style.display = "none";
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
