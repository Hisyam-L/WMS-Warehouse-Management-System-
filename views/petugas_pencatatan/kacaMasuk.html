<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Kaca Masuk</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='petugas_pencatatan/css/kacaMasuk.css') }}">
</head>

<body>

    <div class="container-layout">
        <div class="sidebar">
            <h3>Petugas Pencatatan</h3>

            <button>Lapor Barang Masuk</button>
            <button>Info Barang Dibeli</button>
            <button>Lapor Barang Keluar</button>
            <button>Pesan / Chatting</button>
            <button>Logout</button>
        </div>

        <div class="content">
            <div class="navbarMobile">
                <div>Petugas Pencatatan</div>
                <div onclick="toggleMenu()" style="cursor:pointer;font-size:22px;">
                    ☰
                </div>
            </div>
            <div id="mobileMenu" class="menuMobile">
                <button>Lapor Barang Masuk</button>
                <button>Info Barang Dibeli</button>
                <button>Lapor Barang Keluar</button>
                <button>Pesan / Chatting</button>
                <button>Logout</button>
            </div>
            <div class="cardUtama">
                <div class="boxHeader">
                    Laporan Kaca Masuk
                </div>
                <form>
                    <div class="mb-4">
                        <label class="labelForm">
                            Tambah Gambar
                        </label>
                        <div class="boxUpload" onclick="bukaKamera()">
                            <span id="uploadText">
                                Klik untuk buka kamera
                            </span>
                            <img id="previewImage">
                        </div>
                        <input type="file" id="imgInput" accept="image/*" capture="environment" style="display:none;">
                    </div>
                    <div class="mb-3">
                        <label class="labelForm">
                            Kategori Kaca
                        </label>
                        <select class="form-select">
                            <option>Pilih Kategori</option>
                            <option>Cermin</option>
                            <option>Rebaint</option>
                            <option>Biru</option>
                            <option>Hitam</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="labelForm">
                            Ukuran Kaca
                        </label>

                        <select class="form-select">
                            <option>Pilih Ukuran</option>
                            <option>100 x 200</option>
                            <option>150 x 250</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="labelForm">
                            Ketebalan Kaca
                        </label>

                        <select class="form-select">
                            <option>Pilih Ketebalan</option>
                            <option>2 mm</option>
                            <option>5 mm</option>
                            <option>10 mm</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="labelForm">
                            Jumlah Kaca
                        </label>

                        <input type="number" class="form-control" rows="4"
                            placeholder="Masukkan Jumlah Kaca">
                    </div>
                    <button type="submit" class="btn-submit">
                        Catat Kaca Masuk
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='petugas_pencatatan/js/kacaMasuk.js') }}"></script>
</body>
</html>
