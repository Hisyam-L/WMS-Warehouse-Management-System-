<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petugas Pencatatan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='petugas_pencatatan/css/laporCatatKeluar.css') }}">
</head>

<body>

    <div class="kontainerAplikasi"> 
        <header class="bilahNavigasi"> <span class="judulAplikasi"> Petugas Pencatatan </span>
            <div onclick="toggleMenu()" class="tombolMenu"> ☰ </div>
            <div id="mobileMenu" class="menuMobile"> <button>Lapor Barang Masuk</button> <button>Info Barang
                    Dibeli</button> <button>Lapor Barang Keluar</button> <button>Pesan / Chatting</button>
                <button>Logout</button> </div>
        </header>
        <div class="pembungkusKonten">
            <div id="daftarSudahDibeli" class="grupDaftar">
                <div class="bingkaiLaporan">
                    <div class="kotakJudulLaporan"> Laporan Kaca Keluar </div>
                    <form id="formulirLaporanKaca">
                        <div class="barisFormulir"> <label class="labelFormulir"> Nama Pembeli </label> <input
                                type="text" class="inputFormulir" value="Ariansyah"> </div>
                        <div class="barisFormulir"> <label class="labelFormulir"> Kategori Kaca </label> <input
                                type="text" class="inputFormulir" value="Kaca Cermin"> </div>
                        <div class="barisFormulir"> <label class="labelFormulir"> Ukuran Kaca </label> <input
                                type="text" class="inputFormulir" value="180 × 22 CM"> </div>
                        <div class="barisFormulir"> <label class="labelFormulir"> Ketebalan Kaca </label> <input
                                type="text" class="inputFormulir" value="6 Mili"> </div>
                        <div class="barisFormulir"> <label class="labelFormulir"> Kondisi Kaca </label> <input
                                type="text" class="inputFormulir" value="Rusak"> </div>
                        <div class="barisFormulir"> <label class="labelFormulir"> Jumlah Kaca </label> <input
                                type="number" class="inputFormulir" value="2"> </div>
                        <div class="barisFormulir"> <label class="labelFormulir"> No HP Pembeli </label> <input
                                type="text" class="inputFormulir" value="08123456789"> </div>
                        <div class="barisFormulir"> <label class="labelFormulir"> Status Pembayaran </label> <input
                                type="text" class="inputFormulir" value="Belum Dibayar"> </div>
                        <div class="barisFormulir"> <label class="labelFormulir"> Alamat Tujuan </label> <textarea
                                class="areaTeksFormulir">Jl. Solo KM 56 Yogyakarta</textarea> </div>
                        <div class="areaTombolAksi"> <button type="button" class="tombolAksi"> Keluar </button> <button
                                type="submit" class="tombolAksi"> Catat Kaca Keluar </button> </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='petugas_pencatatan/js/laporCatatKeluar.js') }}"></script>

</body>

</html>
