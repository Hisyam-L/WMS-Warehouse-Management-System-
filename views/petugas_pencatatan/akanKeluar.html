<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petugas Pencatatan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='petugas_pencatatan/css/akanKeluar.css') }}">
</head>

<body>

    <div class="kontainerAplikasi"> 
        <header class="bilahNavigasi">
            <div class="atasNavbar"> <span class="judulAplikasi"> Petugas Pencatatan </span>
                <div class="tombolMenu" onclick="toggleMenu()"> ☰ </div>
            </div> 
            <div class="menuNavigasi" id="menuNavigasi"> <button class="tombolSidebar"> Lapor Barang Masuk </button>
                <button class="tombolSidebar"> Info Barang Dibeli </button> <button class="tombolSidebar"> Lapor Barang
                    Keluar </button> <button class="tombolSidebar"> Pesan / Chatting </button> <button
                    class="tombolSidebar"> Logout </button> </div>
        </header>
        <div class="pembungkusKonten"> 
            <main class="kontenBarang"> 
                <div id="daftarAkanDibeli" class="grupDaftar tampilkan">
                    <div class="pembungkusKartu">
                        <div class="kartuDetailBarang">
                            <div class="kontenSpesifikasi">
                                <div class="kolomKiri">
                                    <div class="labelStatus"> Status: Rusak </div>
                                    <table class="tabelInformasi">
                                        <tr>
                                            <td>Kategori</td>
                                            <td>:</td>
                                            <td>Cermin</td>
                                        </tr>
                                        <tr>
                                            <td>Ukuran</td>
                                            <td>:</td>
                                            <td>2 Mili</td>
                                        </tr>
                                        <tr>
                                            <td>Ketebalan</td>
                                            <td>:</td>
                                            <td>193 × 22 CM</td>
                                        </tr>
                                        <tr>
                                            <td>Jumlah</td>
                                            <td>:</td>
                                            <td>20 Buah</td>
                                        </tr>
                                    </table>
                                </div>
                            </div> <a href="akanMuncul" class="pitaPemesan"> Barang dipesan oleh: Ariansyah </a>
                        </div>
                    </div>
                </div> <!-- SUDAH DIBELI -->
                <div id="daftarSudahDibeli" class="grupDaftar">
                    <div class="pembungkusKartu">
                        <div class="kartuDetailBarang">
                            <div class="kontenSpesifikasi">
                                <div class="kolomKiri">
                                    <div class="labelStatus" style="background:#28a745"> Status: Aman </div>
                                    <table class="tabelInformasi">
                                        <tr>
                                            <td>Kategori</td>
                                            <td>:</td>
                                            <td>Tempered</td>
                                        </tr>
                                        <tr>
                                            <td>Ukuran</td>
                                            <td>:</td>
                                            <td>8 Mili</td>
                                        </tr>
                                    </table>
                                </div>
                                <div class="kolomKanan">
                                    <table class="tabelInformasi">
                                        <tr>
                                            <td>Ketebalan</td>
                                            <td>:</td>
                                            <td>200 × 80 CM</td>
                                        </tr>
                                        <tr>
                                            <td>Jumlah</td>
                                            <td>:</td>
                                            <td>5 Buah</td>
                                        </tr>
                                    </table>
                                </div>
                            </div>
                            <div class="pitaPemesan"> Barang dipesan oleh: Ridwan </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="{{ url_for('static', filename='petugas_pencatatan/js/akanKeluar.js') }}"></script>

</body>

</html>
