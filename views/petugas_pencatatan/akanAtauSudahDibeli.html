<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petugas Pencatatan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='petugas_pencatatan/css/akanAtauSudahDibeli.css') }}">
</head>

<body>

    <div class="kontainerAplikasi">
        <div class="sidebarWrapper">
            <header class="bilahNavigasi">
                <span class="judulAplikasi">
                    Petugas Pencatatan
                </span>
                <div class="hamburgerMenu" onclick="toggleMenu()">
                    ☰
                </div>
            </header>
            <div class="menuMobile" id="menuMobile">
                <button>
                    Lapor Barang Masuk
                </button>
                <button>
                    Info Barang Dibeli
                </button>
                <button>
                    Lapor Barang Keluar
                </button>
                <button>
                    Pesan / Chatting
                </button>
                <button>
                    Logout
                </button>
            </div>
        </div>

        <div class="pembungkusKonten">
            <section class="areaKontrol">
                <button id="tabAkanDibeli" class="tombolTab tombolAkanDibeli aktif">
                    Akan Dibeli
                </button>
                <button id="tabSudahDibeli" class="tombolTab tombolSudahDibeli tidakAktif">
                    Sudah Dibeli
                </button>
            </section>
            <main class="kontenBarang">
                <div id="daftarAkanDibeli" class="grupDaftar tampilkan">
                    <div class="pembungkusKartu">
                        <div class="kartuBarang">
                            <span class="namaBarang">
                                Beras Cianjur 5kg
                            </span>
                            <span class="jumlahBarang">
                                2 Karung
                            </span>
                        </div>
                        <div class="kartuBarang">
                            <span class="namaBarang">
                                Minyak Goreng 2L
                            </span>
                            <span class="jumlahBarang">
                                3 Pcs
                            </span>
                        </div>
                        <div class="kartuBarang">
                            <span class="namaBarang">
                                Gula Pasir 1kg
                            </span>
                            <span class="jumlahBarang">
                                5 Bungkus
                            </span>
                        </div>
                    </div>
                </div>

                <div id="daftarSudahDibeli" class="grupDaftar">
                    <div class="pembungkusKartu">
                        <div class="kartuBarang">
                            <span class="namaBarang">
                                Telur Ayam 1kg
                            </span>
                            <span class="jumlahBarang">
                                1 Kotak
                            </span>
                        </div>

                        <div class="kartuBarang">
                            <span class="namaBarang">
                                Sabun Cuci Piring
                            </span>
                            <span class="jumlahBarang">
                                2 Botol
                            </span>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="{{ url_for('static', filename='petugas_pencatatan/js/akanAtauSudahDibeli.js') }}"></script>

</body>

</html>
