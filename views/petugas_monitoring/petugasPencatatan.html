<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Petugas Pencatatan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='petugas_monitoring/css/petugasPencatatan.css') }}">
</head>

<body>

    <div class="container-layout">
        <div class="sidebar">
            <h3>Monitoring Kaca</h3> <button>Dashboard</button> <button>Laporan Stok</button> <button>Instruksi Membeli
                Barang</button> <button>Laporan Kondisi Barang</button> <button>Pesan / Chatting</button>
            <button>Logout</button>
        </div>
        <div class="content">
            <div class="navbar-mobile">
                <div>Petugas Monitoring</div>
                <div onclick="toggleMenu()" style="cursor:pointer;font-size:22px;"> ☰ </div>
            </div>
            <div id="mobileMenu" class="mobile-menu"> <button>Dashboard</button> <button>Laporan Stok</button>
                <button>Instruksi Membeli Barang</button> <button>Laporan Kondisi Barang</button> <button>Pesan /
                    Chatting</button> <button>Logout</button> </div>
            <div class="chat-container">
                <div class="chat-header"> <button class="back-btn" onclick="window.location.href='chatting.html'"> ←
                    </button> <span> Petugas Pencatatan </span> </div>
                <div class="chat-box" id="chatBox">
                    <div class="bubble bubble-left">
                        <div class="avatar"></div>
                        <div class="message"> Halo, bagaimana kondisi stok kaca hari ini? </div>
                    </div>
                    <div class="bubble bubble-right">
                        <div class="avatar"></div>
                        <div class="message"> Aman pak, stok masih tersedia. </div>
                    </div>
                    <div class="bubble bubble-left">
                        <div class="avatar"></div>
                        <div class="message"> Ada kaca yang rusak? </div>
                    </div>
                    <div class="bubble bubble-right">
                        <div class="avatar"></div>
                        <div class="message"> Ada beberapa kaca biru yang retak. </div>
                    </div>
                </div>
                <div class="chat-footer">
                    <div class="input-group"> <input type="text" id="chatInput" class="input-chat"
                            placeholder="Ketik pesan..."> <button class="send-btn" onclick="kirimPesan()"> ➤ </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='petugas_monitoring/js/petugasPencatatan.js') }}"></script>

</body>

</html>
