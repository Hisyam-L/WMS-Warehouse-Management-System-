<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Petugas Pencatatan</title>

    <style>
        body {
            margin: 0;
            font-family: system-ui, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #0f172a;
        }

        /* LAYOUT */
        .container-layout {
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, #0f172a, #1e293b);
            color: white;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar h3 {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .sidebar button {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: none;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
            font-size: 15px;
        }

        .sidebar button:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateX(3px);
        }

        /* CONTENT */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
        }

        /* NAVBAR MOBILE */
        .navbar-mobile {
            display: none;
            background: #0f172a;
            color: white;
            padding: 15px;
            justify-content: space-between;
            align-items: center;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        /* MOBILE MENU */
        .mobile-menu {
            display: none;
            flex-direction: column;
            margin-bottom: 15px;
            background: #1e293b;
            padding: 10px;
            border-radius: 10px;
        }

        .mobile-menu button {
            margin-top: 5px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: none;
            border-radius: 8px;
        }

        /* CHAT CARD */
        .chat-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            overflow: hidden;

            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* CHAT HEADER */
        .chat-header {
            background: #0f172a;
            color: white;
            padding: 16px 20px;
            font-weight: 600;
            font-size: 18px;
        }

        /* CHAT AREA */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;

            display: flex;
            flex-direction: column;
            gap: 18px;

            background: #f8fafc;
        }

        /* BUBBLE */
        .bubble {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            max-width: 75%;
        }

        .bubble-left {
            align-self: flex-start;
        }

        .bubble-right {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        /* AVATAR */
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #cbd5e1;
            flex-shrink: 0;
        }

        /* MESSAGE */
        .message {
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .bubble-left .message {
            background: white;
            border: 1px solid #e2e8f0;
        }

        .bubble-right .message {
            background: #0f172a;
            color: white;
        }

        /* FOOTER */
        .chat-footer {
            padding: 15px;
            border-top: 1px solid #e2e8f0;
            background: white;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-chat {
            flex: 1;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 12px 15px;
            outline: none;
            font-size: 14px;
        }

        .input-chat:focus {
            border-color: #0f172a;
            box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.1);
        }

        /* BUTTON SEND */
        .send-btn {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 12px;
            background: #0f172a;
            color: white;
            cursor: pointer;
            transition: 0.2s;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .send-btn:hover {
            background: #1e293b;
        }

        .chat-header {
            background: #0f172a;
            color: white;
            padding: 16px 20px;
            font-weight: 600;
            font-size: 18px;

            display: flex;
            align-items: center;
            gap: 14px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.22);
        }

        /* RESPONSIVE */
        @media(max-width:768px) {

            .sidebar {
                display: none;
            }

            .navbar-mobile {
                display: flex;
            }

            .content {
                padding: 15px;
                height: 100vh;
            }

            .bubble {
                max-width: 90%;
            }
        }
    </style>
</head>

<body>

    <div class="container-layout">

        <!-- SIDEBAR -->
        <div class="sidebar">

            <h3>Monitoring Kaca</h3>

            <button>Dashboard</button>
            <button>Laporan Stok</button>
            <button>Instruksi Membeli Barang</button>
            <button>Laporan Kondisi Barang</button>
            <button>Pesan / Chatting</button>
            <button>Logout</button>

        </div>

        <!-- CONTENT -->
        <div class="content">

            <!-- NAVBAR MOBILE -->
            <div class="navbar-mobile">

                <div>Petugas Monitoring</div>

                <div onclick="toggleMenu()" style="cursor:pointer;font-size:22px;">
                    ☰
                </div>

            </div>

            <!-- MOBILE MENU -->
            <div id="mobileMenu" class="mobile-menu">

                <button>Dashboard</button>
                <button>Laporan Stok</button>
                <button>Instruksi Membeli Barang</button>
                <button>Laporan Kondisi Barang</button>
                <button>Pesan / Chatting</button>
                <button>Logout</button>

            </div>

            <!-- CHAT -->
            <div class="chat-container">

                <!-- HEADER -->
                <div class="chat-header">

                    <button class="back-btn" onclick="window.location.href='chatting.html'">

                        ←

                    </button>

                    <span>
                        Petugas Pencatatan
                    </span>

                </div>

                <!-- CHAT BOX -->
                <div class="chat-box" id="chatBox">

                    <div class="bubble bubble-left">
                        <div class="avatar"></div>

                        <div class="message">
                            Halo, bagaimana kondisi stok kaca hari ini?
                        </div>
                    </div>

                    <div class="bubble bubble-right">
                        <div class="avatar"></div>

                        <div class="message">
                            Aman pak, stok masih tersedia.
                        </div>
                    </div>

                    <div class="bubble bubble-left">
                        <div class="avatar"></div>

                        <div class="message">
                            Ada kaca yang rusak?
                        </div>
                    </div>

                    <div class="bubble bubble-right">
                        <div class="avatar"></div>

                        <div class="message">
                            Ada beberapa kaca biru yang retak.
                        </div>
                    </div>

                </div>

                <!-- FOOTER -->
                <div class="chat-footer">

                    <div class="input-group">

                        <input type="text" id="chatInput" class="input-chat" placeholder="Ketik pesan...">

                        <button class="send-btn" onclick="kirimPesan()">

                            ➤

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

        let menuOpen = false;

        function toggleMenu() {

            menuOpen = !menuOpen;

            document.getElementById("mobileMenu").style.display =
                menuOpen ? "flex" : "none";
        }

        function kirimPesan() {

            const input = document.getElementById("chatInput");
            const chatBox = document.getElementById("chatBox");

            const pesan = input.value.trim();

            if (pesan === "") return;

            const bubble = document.createElement("div");
            bubble.className = "bubble bubble-right";

            bubble.innerHTML = `
                <div class="avatar"></div>

                <div class="message">
                    ${pesan}
                </div>
            `;

            chatBox.appendChild(bubble);

            input.value = "";

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        /* enter untuk kirim */
        document.getElementById("chatInput")
            .addEventListener("keypress", function (e) {

                if (e.key === "Enter") {

                    kirimPesan();
                }
            });

        /* auto scroll bawah */
        window.onload = function () {

            const chatBox = document.getElementById("chatBox");

            chatBox.scrollTop = chatBox.scrollHeight;
        }

    </script>

</body>

</html>
