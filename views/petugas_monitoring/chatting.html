<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chattime - Petugas Monitoring</title>

    <style>
        body {
            margin: 0;
            font-family: system-ui, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #0f172a;
        }

        /* LAYOUT */
        .container-layout {
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, #0f172a, #1e293b);
            color: white;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar h3 {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .sidebar button {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: none;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
            font-size: 15px;
        }

        .sidebar button:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateX(3px);
        }

        /* CONTENT */
        .content {
            flex: 1;
            padding: 20px;
        }

        /* NAVBAR MOBILE */
        .navbar-mobile {
            display: none;
            background: #0f172a;
            color: white;
            padding: 15px;
            justify-content: space-between;
            align-items: center;
            border-radius: 10px;
        }

        /* MOBILE MENU */
        .mobile-menu {
            display: none;
            flex-direction: column;
            margin-top: 10px;
            background: #1e293b;
            padding: 10px;
            border-radius: 10px;
        }

        .mobile-menu button {
            margin-top: 5px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* CHAT CARD */
        .chat-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        /* HEADER */
        .chat-header {
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 16px;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* CHAT ITEM */
        .chat-item {
            padding: 18px 20px;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
            font-weight: 500;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-item:hover {
            background: #f1f5f9;
        }

        .chat-item:last-child {
            border-bottom: none;
        }

        .arrow {
            font-size: 18px;
            color: #64748b;
        }

        /* RESPONSIVE */
        @media(max-width:768px) {

            .sidebar {
                display: none;
            }

            .navbar-mobile {
                display: flex;
            }

            .content {
                padding: 15px;
            }
        }
    </style>
</head>

<body>

    <div class="container-layout">

        <!-- SIDEBAR -->
        <div class="sidebar">

            <h3>Monitoring Kaca</h3>

            <button>Dashboard</button>
            <button>Laporan Stok</button>
            <button>Instruksi Membeli Barang</button>
            <button>Laporan Kondisi Barang</button>
            <button>Pesan / Chatting</button>
            <button>Logout</button>

        </div>

        <!-- CONTENT -->
        <div class="content">

            <!-- NAVBAR MOBILE -->
            <div class="navbar-mobile">

                <div>Petugas Monitoring</div>

                <div onclick="toggleMenu()" style="cursor:pointer;font-size:22px;">
                    ☰
                </div>

            </div>

            <!-- MOBILE MENU -->
            <div id="mobileMenu" class="mobile-menu">

                <button>Dashboard</button>
                <button>Laporan Stok</button>
                <button>Instruksi Membeli Barang</button>
                <button>Laporan Kondisi Barang</button>
                <button>Pesan / Chatting</button>
                <button>Logout</button>

            </div>

            <!-- CHAT -->
            <div class="chat-card">

                <div class="chat-header">
                    Chattime
                </div>

                <div class="chat-list">

                    <div class="chat-item"
                        onclick="window.location.href='kepalaGudang.html'">

                        <span>Kepala Gudang</span>
                        <span class="arrow">➜</span>

                    </div>

                    <div class="chat-item"
                        onclick="window.location.href='petugasPencatatan.html'">

                        <span>Petugas Pencatatan</span>
                        <span class="arrow">➜</span>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

        let menuOpen = false;

        function toggleMenu() {

            menuOpen = !menuOpen;

            document.getElementById("mobileMenu").style.display =
                menuOpen ? "flex" : "none";
        }

    </script>

</body>

</html>
