<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #20264b;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 550px;
            background: #eeeeee;
            border-radius: 5px;
            padding: 38px 45px;
        }

        .title {
            text-align: center;
            font-size: 23px;
            color: #1f1f1f;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .boxInput {
            margin-bottom: 18px;
        }

        .boxInput input {
            width: 100%;
            height: 42px;
            border: 1px solid #8ab0ff;
            border-radius: 5px;
            outline: none;
            padding: 0 14px;
            font-size: 14px;
            background: #f8f8f8;
            color: #222;
        }

        .boxInput input::placeholder {
            color: #2f2f2f;
        }

        .btn {
            width: 175px;
            height: 40px;
            border: none;
            border-radius: 5px;
            background: #23284d;
            color: white;
            display: block;
            margin: 24px auto 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            background: #1d2242;
        }

        .daftar {
            text-align: center;
            font-size: 16px;
            color: #2c2c2c;
            cursor: pointer;
        }

        /* Tambahan style untuk pesan error/sukses */
        .alert {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            text-align: center;
            font-size: 14px;
        }

        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1 class="title">Masuk</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="boxInput">
                <input type="email" name="email" placeholder="Masukan Email Anda" required>
            </div>
            <div class="boxInput">
                <input type="password" name="password" placeholder="Masukan password" required>
            </div>

            <button type="submit" class="btn">Masuk</button>
        </form>

        <p class="daftar" id="btnPindahDaftar">Belum punya akun?</p>
    </div>

    <script>
        const btnPindah = document.getElementById("btnPindahDaftar");

        // Pindah ke rute daftar kepala gudang
        btnPindah.addEventListener("click", () => {
            window.location.href = '/daftar-kepala';
        });
    </script>
</body>

</html>
